# Font configuration
font:
  normal:
    family: JetBrains Mono
    style: Regular

  size: 8.0

# Cursor
cursor:
  style:
    shape: Beam
    blinking: Off

  vi_mode_style: Block

# Disable the visual bell animation.
bell:
  duration: 0

# Live reload
live_config_reload: true

# Hide the cursor when typing
mouse:
  hide_when_typing: true

# Spawn new terminal at the current working directory
key_bindings:
  - { key: Return,   mods: Control|Shift, action: SpawnNewInstance }

# Variable for proper SSH working
env:
  TERM: xterm-256color

